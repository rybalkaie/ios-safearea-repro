name: island-repro
on:
  workflow_dispatch:
    inputs:
      url:
        description: Page to test
        default: "https://blog.altronix.store/guides/altronix-bravo-220d-vs-jbl-partybox-110?v=sim1"
jobs:
  repro:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Boot iPhone 17 Pro (iOS 26.5)
        run: |
          UDID=$(xcrun simctl list devices "iOS 26.5" | grep "iPhone 17 Pro (" | head -1 | grep -oE '[0-9A-F-]{36}')
          echo "UDID=$UDID" >> "$GITHUB_ENV"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID"
          open -a Simulator || true
          sleep 10

      - name: Install idb (touch input for simulator)
        run: |
          brew install idb-companion || brew install facebook/fb/idb-companion
          # fb-idb ломается на python 3.14 (asyncio.get_event_loop) — пиним 3.12
          brew install python@3.12
          pipx install fb-idb --python "$(brew --prefix python@3.12)/bin/python3.12"
          idb list-targets | head -5 || true

      - name: Blog page — rest / scrolled / settled
        run: |
          mkdir -p shots
          xcrun simctl openurl "$UDID" "${{ github.event.inputs.url || 'https://blog.altronix.store/guides/altronix-bravo-220d-vs-jbl-partybox-110?v=sim1' }}"
          sleep 15
          # Первичный тултип Safari «View Bookmarks…» — закрыть крестиком (точки, не px)
          idb ui tap --udid "$UDID" 364 619 || true
          sleep 2
          xcrun simctl io "$UDID" screenshot shots/blog-1-rest.png
          xcrun simctl io "$UDID" recordVideo --codec h264 shots/blog-scroll.mp4 & VID=$!
          sleep 1
          idb ui swipe --udid "$UDID" 200 650 200 250 --duration 0.15
          sleep 0.5
          idb ui swipe --udid "$UDID" 200 650 200 250 --duration 0.15
          sleep 1
          xcrun simctl io "$UDID" screenshot shots/blog-2-after-scroll.png
          sleep 3
          xcrun simctl io "$UDID" screenshot shots/blog-3-settled.png
          # лёгкий обратный свайп + покой — как «прокрутил и отпустил» у владельца
          idb ui swipe --udid "$UDID" 200 400 200 550 --duration 0.15
          sleep 3
          xcrun simctl io "$UDID" screenshot shots/blog-4-scrollback-settled.png
          kill -INT $VID || true
          sleep 2

      - name: Control page — apple.com
        run: |
          xcrun simctl openurl "$UDID" "https://www.apple.com/"
          sleep 12
          xcrun simctl io "$UDID" screenshot shots/apple-1-rest.png
          idb ui swipe --udid "$UDID" 200 650 200 250 --duration 0.15
          sleep 3
          xcrun simctl io "$UDID" screenshot shots/apple-2-settled.png

      - name: Upload shots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shots
          path: shots/
